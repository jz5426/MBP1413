defaults:
  - _self_
  - data_test:
    - chestXDet10 # (FS)
    - chexpert #(FS)
    - chest14 # (FS) 
    - chestXDet10_gt
    - physician_padchest207 # (FS) 
  - dataloader: dataloader_256

base:
  seed: 1234

test:
  checkpoint: 
    - PATH TO THE .tar CHECKPOINT.

  seed: 1234

hydra:
  run:
    dir: ./eval_outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  job_logging:
    version: 1
    formatters:
      simple:
        format: "%(message)s"
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        filename: ${hydra.run.dir}/evaluate.log
        formatter: simple
    root:
      level: INFO
      handlers: [file, console]
    disable_existing_loggers: false

designs:
  model:
    image_encoder:
      configs:
        normalize: null # intentional